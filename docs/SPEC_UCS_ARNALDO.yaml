      valor_literal: "async () => {\n  const token = localStorage.getItem('editais_ia_access_token');\n  // Pega UF da empresa\n  const r1 = await fetch('/api/auth/user', {headers:{Authorization:`Bearer ${token}`}});\n  if (!r1.ok) throw new Error(`/api/auth/user ${r1.status}`);\n  const u = await r1.json();\n  if (!u.has_empresa) throw new Error('Pre-cond: sem empresa');\n  const empresa_uf = (u.empresa.uf || '').toUpperCase();\n  if (!empresa_uf) throw new Error('Empresa sem UF');\n  // Lista fontes\n  const r2 = await fetch('/api/crud/fontes-certidoes?limit=200', {headers:{Authorization:`Bearer ${token}`}});\n  if (!r2.ok) throw new Error(`API fontes ${r2.status}`);\n  const data = await r2.json();\n  const items = data.items || data.dados || [];\n  const invalidas = items.filter(f => f.uf && f.uf.toUpperCase() !== empresa_uf).map(f => `${f.nome||f.id}=${f.uf}`);\n  if (invalidas.length) {\n    throw new Error(`F04-01 NAO corrigido: empresa UF=${empresa_uf} VE ${invalidas.length} fontes outras UFs: ${invalidas.slice(0,5).join('|')}`);\n  }\n  const federais = items.filter(f => !f.uf).length;\n  return `F04-01_OK empresa_uf=${empresa_uf} total=${items.length} federais=${federais} estaduais_${empresa_uf}=${items.length-federais}`;\n}"
    descricao_passo: 'Confirma F04-01: empresa SP nao ve fontes de outras UFs (filtro server-side). Antes via fontes MG/PR/RS sem filtro.'
    pontos_observacao:
    - Empresa Bio-Hosp tem UF=SP (verificado via /api/empresa/atual)
    - 'GET /api/crud/fontes-certidoes retorna apenas: federais (UF NULL) + UF SP'
    - ZERO fontes UF=MG, PR, RS ou outras estaduais na resposta
    asserts_rede:
    - url_contem: /api/crud/fontes-certidoes
      metodo: GET
      status_in:
