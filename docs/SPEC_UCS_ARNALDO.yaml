    - url_contem: /api/crud/empresa-certidoes
      metodo: GET
      status_in:
      - 200
  pontos_observacao:
  - Pelo menos 1 certidao tem path_arquivo nao-NULL
  dados_pre_condicoes:
  - Backend salva path_arquivo mesmo quando scraper retorna PDF com status pendente
  - 'Antes: path so era salvo se status=valida; agora salvo sempre'
- id: UC-ARN-23
  obs: F05-01-02-03
  titulo: 'Responsavel: submenu, validade, doc outorga'
  descricao: 'Form de Novo Responsavel tem 3 campos novos (Validade, outorga, caminho/documento).

    '
  passos:
  - id: passo_00_navegar_crud_responsaveis
    titulo: CRUD empresa-responsaveis
    acao:
      tipo: evaluate
      valor_literal: "async () => {\n  const sec = [...document.querySelectorAll('button.nav-section-header')]\n    .find(b => /Cadastros/i.test(b.textContent || ''));\n  if (!sec) throw new Error('Secao \"Cadastros\" nao achada na sidebar');\n  if (!sec.classList.contains('expanded')) { sec.click(); await new Promise(r=>setTimeout(r,400)); }\n  if (!sec.classList.contains('expanded')) { sec.click(); await new Promise(r=>setTimeout(r,400)); }\n  const sub = [...document.querySelectorAll('button.nav-subsection-header')]\n    .find(b => /^\\s*Empresa\\s*$/i.test(b.querySelector('.nav-item-label')?.textContent?.trim() || ''));\n  if (!sub) throw new Error('Subsection \"Empresa\" nao achada (super-only? user nao eh super?)');\n  if (!sub.classList.contains('expanded')) { sub.click(); await new Promise(r=>setTimeout(r,400)); }\n  const it = [...document.querySelectorAll('button.nav-item')]\n    .find(el => /^\\s*Respons[aá]veis e Representantes|Respons[aá]veis\\s*$/i.test(el.querySelector('.nav-item-label')?.textContent?.trim() || ''));\n  if (!it) throw new Error('Item \"Respons[aá]veis e Representantes|Respons[aá]veis\" nao achado dentro de \"Empresa\"');\n  it.click();\n  await new Promise(r => setTimeout(r, 1500));\n  return 'navegou_3niveis_Cadastros_Empresa_Respons[aá]veis e Representantes|Respons[aá]veis';\n}"
    descricao_passo: Tester abre Sidebar > Cadastros > Empresa > Responsaveis e Representantes. Confirma F05-01 (submenu renomeado).
    pontos_observacao:
    - Sidebar > Cadastros > Empresa > 'Responsaveis e Representantes' abre tela
    - 'Header da tela: ''Responsaveis e Representantes'''
    - Submenu renomeado de 'Responsaveis' para 'Responsaveis e Representantes' (F05-01)
    asserts_dom:
    - selector: h1:has-text("Respons"), h2:has-text("Respons")
  - id: passo_01_clicar_novo
    titulo: Clica botao Novo (texto pode ser '+ Novo' ou 'Novo')
    acao:
      tipo: evaluate
      valor_literal: "async () => {\n  const btn = [...document.querySelectorAll('button')].find(b => /^\\s*\\+?\\s*Novo\\s*$/i.test(b.textContent?.trim() || ''));\n  if (!btn) {\n    const titulos = [...document.querySelectorAll('button')].map(b=>b.textContent?.trim()).filter(t=>t&&t.length<30).slice(0,15);\n    throw new Error(`Botao Novo nao achado em /crud/empresa-responsaveis. Botoes: ${titulos.join('|')}`);\n  }\n  btn.click();\n  await new Promise(r=>setTimeout(r,1500));\n  return 'click_novo_responsavel_OK';\n}"
    descricao_passo: Tester clica botao '+ Novo' para abrir form de novo responsavel.
    pontos_observacao:
    - Botao '+ Novo' visivel no canto superior direito
    - Apos clicar, form Novo abre
    asserts_dom: *id001
  - id: passo_02_validar_3_novos_campos
    titulo: 'Form (modal/drawer/inline) tem 3 campos novos: Validade, outorga, caminho/documento'
    acao:
      tipo: evaluate
      valor_literal: "() => {\n  // F05-02-03: form Novo Responsavel deve ter 3 campos novos: Validade, doc outorga, caminho/path\n  const labels = [...document.querySelectorAll('label')].map(l => l.textContent?.trim() || '');\n  // Procura cada campo novo\n  const validade = labels.find(l => /Validade/i.test(l));\n  const outorga = labels.find(l => /outorga|procura[cç][aã]o/i.test(l));\n  const caminho = labels.find(l => /caminho|path|documento|arquivo|certificado/i.test(l));\n  const faltam = [];\n  if (!validade) faltam.push('Validade');\n  if (!outorga) faltam.push('outorga|procuracao');\n  if (!caminho) faltam.push('caminho|documento');\n  if (faltam.length) {\n    throw new Error(`F05 incompleto. Faltando: ${faltam.join(', ')}. Labels visiveis: ${labels.slice(0,15).join(' | ')}`);\n  }\n  return `F05-01-02-03_OK Validade=\"${validade}\" outorga=\"${outorga}\" caminho=\"${caminho}\"`;\n}"
    descricao_passo: 'Confirma F05-02-03: form tem 3 campos novos (Validade, Documento de outorga, Caminho do documento). Antes faltavam.'
    pontos_observacao:
    - Form Novo tem campo 'Validade' (input type=date) — F05-02
    - Form Novo tem campo 'Documento de outorga' (campo texto) — F05-03
    - Form Novo tem campo 'Caminho do documento' ou similar (path/upload)
    - 3 campos antes nao existiam — adicionados pela correcao F05-01-02-03
    asserts_dom: *id001
  pontos_observacao:
  - Modal abre E tem 3 inputs (Validade/outorga/caminho|documento)
  dados_pre_condicoes:
  - Submenu chama-se 'Responsaveis e Representantes' (antes era 'Responsaveis')
  - 'Form Novo tem 3 campos novos: Validade, doc_outorga, caminho_documento'
  - Migration 052 aplicada (tabela responsavel_documento)
- id: UC-ARN-24
  obs: F13-01
  titulo: UNIQUE area/classe + erro amigavel
  descricao: 'POST /api/crud/areas-produto duas vezes com mesmo nome -> 2a retorna 409

    com mensagem amigavel. Cleanup ao final.

    '
  passos:
  - id: passo_00_criar_area_1
    titulo: POST area 1 (deve criar OU ja existir)
    acao:
      tipo: evaluate
      valor_literal: "async () => {\n  const token = localStorage.getItem('editais_ia_access_token');\n  const nome = `AREA TESTE ARN24 ${Date.now()}`;\n  window.__arn24_nome = nome;\n  const r = await fetch('/api/crud/areas-produto', {\n    method: 'POST', headers: {'Content-Type':'application/json', Authorization:`Bearer ${token}`}, body: JSON.stringify({nome})\n  });\n  if (!r.ok) throw new Error(`POST 1 falhou: ${r.status} ${await r.text().catch(()=>'')}`);\n  const data = await r.json();\n  if (!data.id) throw new Error('1a area sem id');\n  window.__arn24_id = data.id;\n  return `area1_criada id=${data.id.slice(0,8)} nome=${nome}`;\n}"
    descricao_passo: 'Cria primeira area com nome unico timestamped. Esperado: 200/201 com ID.'
    pontos_observacao:
    - POST /api/crud/areas-produto cria nova area com sucesso (200/201)
    - Resposta tem id (UUID) da area criada
    asserts_rede:
    - url_contem: /api/crud/areas-produto
      metodo: POST
      status_in:
      - 200
      - 201
    asserts_dom: *id001
  - id: passo_01_criar_area_duplicada
    titulo: POST area duplicada retorna erro com mensagem amigavel (status 400 ou 409)
    acao:
      tipo: evaluate
      valor_literal: "async () => {\n  const token = localStorage.getItem('editais_ia_access_token');\n  const nome = window.__arn24_nome;\n  if (!nome) throw new Error('passo_00 falhou');\n  const r = await fetch('/api/crud/areas-produto', {\n    method: 'POST', headers: {'Content-Type':'application/json', Authorization:`Bearer ${token}`}, body: JSON.stringify({nome})\n  });\n  if (r.status === 200 || r.status === 201) {\n    throw new Error(`F13-01 NAO corrigido: duplicata aceita (status ${r.status})`);\n  }\n  if (r.status !== 400 && r.status !== 409) {\n    throw new Error(`F13-01 status inesperado: ${r.status}`);\n  }\n  const data = await r.json();\n  const msg = data.error || data.message || data.detail || '';\n  // Mensagem amigavel deve mencionar \"Area\" e \"existe\" ou \"Subclasse\"\n  if (!/^Ja existe.*Area|Ja existe.*[áa]rea|Subclasses para variacoes/i.test(msg)) {\n    throw new Error(`F13-01 status ${r.status} mas mensagem nao amigavel: \"${msg}\"`);\n  }\n  return `F13-01_OK status=${r.status} msg_amigavel=\"${msg.slice(0,80)}\"`;\n}"
    descricao_passo: 'ESTE E O PASSO CORE DA F13-01. Tenta criar area com mesmo nome. Esperado: 400/409 com mensagem amigavel (''Ja existe uma Area...''). Antes retornava erro tecnico 500.'
    pontos_observacao:
    - Tentar criar area com mesmo nome retorna erro 400 ou 409
    - 'Mensagem retornada eh AMIGAVEL: ''Ja existe uma Area com este nome'' ou similar'
    - NAO eh erro tecnico tipo 'IntegrityError UNIQUE constraint'
    - 'F13-01: correcao confirmada (UNIQUE constraint + mensagem amigavel)'
    asserts_dom: *id001
  - id: passo_02_cleanup
    titulo: Apaga a area de teste
    acao:
      tipo: evaluate
      valor_literal: "async () => {\n  if (!window.__arn24_id) return 'sem_id';\n  const token = localStorage.getItem('editais_ia_access_token');\n  const r = await fetch(`/api/crud/areas-produto/${window.__arn24_id}`, {\n    method: 'DELETE', headers: {Authorization:`Bearer ${token}`}\n  });\n  return `cleanup status=${r.status}`;\n}"
    descricao_passo: 'Cleanup: deleta a area de teste pra nao poluir banco entre runs.'
    pontos_observacao:
    - DELETE /api/crud/areas-produto/<id> remove a area de teste
    - Banco volta ao estado anterior
    asserts_dom: *id001
  pontos_observacao:
  - 1a chamada cria com sucesso, 2a retorna 409 com mensagem mencionando 'area' ou 'existe'
  dados_pre_condicoes:
  - Migration 053 aplicada (UNIQUE constraint area por empresa)
  - Backend retorna mensagem amigavel 'Ja existe uma Area com este nome'
- id: UC-ARN-25
  obs: F03-03-e2e
  titulo: 'E2E: upload IA + aceite + log auditoria'
  descricao: 'E2E completo do aceite-ia: endpoint funcional + retorna id + payload completo aceito.

    '
  passos:
  - id: passo_00_e2e_aceite
    titulo: POST aceite-ia com payload completo retorna 200 + id UUID
    acao:
      tipo: evaluate
      valor_literal: "async () => {\n  const token = localStorage.getItem('editais_ia_access_token');\n  const recurso_id = `test-${Date.now()}`;\n  const r = await fetch('/api/auditoria/aceite-ia', {\n    method: 'POST',\n    headers: {'Content-Type':'application/json', Authorization:`Bearer ${token}`},\n    body: JSON.stringify({\n      contexto: 'arn25_e2e', recurso_id,\n      dados_extraidos_ia: {tipo: 'contrato_social', razao_social: 'Teste E2E'},\n      dados_aceitos_user: {tipo: 'contrato_social', razao_social: 'Teste E2E'},\n    }),\n  });\n  if (!r.ok) throw new Error(`E2E falhou: ${r.status}`);\n  const data = await r.json();\n  if (!data.id || !/^[0-9a-f-]{36}$/.test(data.id)) throw new Error(`id invalido: ${JSON.stringify(data)}`);\n  return `F03-03_e2e_OK id=${data.id.slice(0,8)} recurso=${recurso_id}`;\n}"
    asserts_rede:
    - url_contem: /api/auditoria/aceite-ia
      metodo: POST
      status_in:
      - 200
    descricao_passo: 'F03-03 E2E: POST /api/auditoria/aceite-ia com payload completo (contexto, recurso_id, dados_ia, dados_user). Esperado: 200 + UUID + linha persistida em auditoria_aceite_ia.'
    pontos_observacao:
    - POST /api/auditoria/aceite-ia com payload completo retorna 200
    - Resposta contem id (UUID valido)
    - Tabela auditoria_aceite_ia tem nova linha com contexto='arn25_e2e'
    - Endpoint funcional E2E confirmado (F03-03)
  pontos_observacao:
  - Endpoint aceite 200 + UUID valido + payload completo (contexto, recurso_id, dados_*)
  dados_pre_condicoes:
  - Endpoint POST /api/auditoria/aceite-ia funcional E2E
  - 'Aceita payload completo: contexto, recurso_id, dados_extraidos_ia, dados_aceitos_user'
