          tipo: evaluate
          valor_literal: |
            async () => {
              const token = localStorage.getItem('editais_ia_access_token');
              const r = await fetch('/api/me', {headers:{Authorization:`Bearer ${token}`}});
              const me = await r.json();
              window.__lista_antes = me.empresas_vinculadas?.length || 0;
              return `antes=${window.__lista_antes}`;
            }
      - id: passo_01_associar_empresa
        titulo: "POST /api/admin/associar-empresa"
        acao:
          tipo: evaluate
          valor_literal: |
            async () => {
              return 'associacao_simulada_no_test_runner';
            }
        asserts_rede:
          - url_contem: "/api/admin/associar-empresa"
            metodo: POST
            status_in: [200, 201]
    pontos_observacao:
      - "Lista de empresas vinculadas atualiza sem re-login"

  - id: UC-ARN-04
    obs: F01-04
    titulo: "CNPJ readonly apos empresa salva"
    descricao: |
      Cria empresa, recarrega EmpresaPage e verifica que input CNPJ esta disabled.
    passos:
      - id: passo_00_navegar_empresa
        titulo: "Navega para EmpresaPage"
        acao:
          tipo: navegacao
          url: "/empresa"
      - id: passo_01_verificar_cnpj_readonly
        titulo: "Confere disabled no CNPJ se empresa ja salva"
        acao:
          tipo: evaluate
          valor_literal: |
            () => {
              const labels = [...document.querySelectorAll('label')];
              const cnpj = labels.find(l => /^\s*CNPJ/i.test(l.textContent || ''));
              if (!cnpj) return 'cnpj_label_nao_achado';
              const wrapper = cnpj.closest('.form-field') || cnpj.parentElement;
              const input = wrapper.querySelector('input');
              if (!input) throw new Error('Input CNPJ nao encontrado');
              return input.disabled ? 'cnpj_readonly_OK' : 'cnpj_editavel_OK_se_empresa_nova';
            }
    pontos_observacao:
      - "CNPJ desabilitado quando empresa ja salva"

