  - id: UC-ARN-12
    obs: F03-01
    titulo: "Badge 'Vencido' vs 'Falta envio'"
    descricao: "Logica de calcDocStatus distingue 4 status."
    passos:
      - id: passo_00_validar_logica_4_status
        titulo: "Cria 2 docs simulados e confere badges"
        acao:
          tipo: evaluate
          valor_literal: |
            () => {
              // Simula a funcao calcDocStatus do front
              function calc(hasArquivo, dataVencimento) {
                if (!hasArquivo) return 'falta';
                if (!dataVencimento) return 'ok';
                const venc = new Date(dataVencimento);
                const dias = (venc - new Date()) / 86400000;
                if (dias <= 0) return 'vencido';
                if (dias <= 30) return 'vence';
                return 'ok';
              }
              const ontem = new Date(Date.now() - 86400000).toISOString().slice(0,10);
              const r1 = calc(true, ontem);   // vencido (tem arquivo + data passada)
              const r2 = calc(false, null);   // falta (sem arquivo)
              if (r1 !== 'vencido') throw new Error(`Esperado 'vencido' achou '${r1}'`);
              if (r2 !== 'falta') throw new Error(`Esperado 'falta' achou '${r2}'`);
              return 'F03-01_logica_4_status_OK';
            }

