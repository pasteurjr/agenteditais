  - id: passo_01_verificar_4_campos
    titulo: 'F01-07: 4 campos de endereço (Logradouro/Número/Complemento/Bairro) com INPUTS'
    descricao_passo: Antes (V6) endereco era um campo unico. Arnaldo pediu (F01-07) 4 campos estruturados separados. Verifica que existem 4 inputs (nao so labels).
    pontos_observacao:
