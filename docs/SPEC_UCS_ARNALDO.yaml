- id: UC-ARN-10
  obs: F02-02
  titulo: Cursor pointer global em elementos clicaveis
  descricao: 'Confirma via getComputedStyle que ≥3 botoes nao-disabled tem cursor:pointer.

    '
  passos:
  - id: passo_00_validar_cursor_pointer
    titulo: ≥3 botoes ativos com cursor:pointer
    acao:
      tipo: evaluate
      valor_literal: "() => {\n  // F02-02: cursor:pointer global em botoes nao-disabled\n  const buttons = [...document.querySelectorAll('button:not(:disabled)')].slice(0, 10);\n  if (buttons.length < 3) throw new Error(`Pre-cond: <3 botoes ativos visiveis (${buttons.length})`);\n  const com = [], sem = [];\n  for (const b of buttons) {\n    const cur = getComputedStyle(b).cursor;\n    const lbl = (b.textContent || b.getAttribute('aria-label') || '').slice(0,25).trim();\n    if (cur === 'pointer') com.push(lbl);\n    else sem.push(`${lbl}=${cur}`);\n  }\n  if (com.length < 3) throw new Error(`Esperado >=3 botoes com cursor:pointer, achou ${com.length}. Sem pointer: ${sem.slice(0,3).join('|')}`);\n  return `F02-02_OK ${com.length}/${buttons.length} botoes com cursor:pointer`;\n}"
    descricao_passo: 'Confirma F02-02: CSS global aplica cursor:pointer em todos botoes nao-disabled. Verifica em ≥3 elementos visiveis na tela atual.'
    pontos_observacao:
    - Mouse sobre botoes nao-disabled mostra cursor de mao (pointer)
    - ≥3 botoes na tela atual com cursor:pointer
    - Botoes disabled tem cursor:not-allowed (nao-pointer)
    asserts_dom: *id001
  pontos_observacao:
  - ≥3 botoes nao-disabled tem cursor:pointer (sem qualquer outro valor)
  dados_pre_condicoes:
  - CSS global aplica cursor:pointer em button:not(:disabled), a, [role=button]
