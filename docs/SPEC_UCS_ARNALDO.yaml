# SPEC dos 25 UC-ARN-NN (Sprint 10 — Correções Arnaldo)
# Cada entrada gera 5 arquivos via scripts/gerar_ucs_arnaldo.py

sprint:
  numero: 10
  nome: "Sprint 10 — Correcoes Arnaldo"
  projeto_id: "00000000-0000-0000-0000-000000000001"
  ciclo_id_default: "arnaldo-correcoes-v1"

ucs:

  - id: UC-ARN-01
    obs: F01-01
    titulo: "Cadastro de empresa via upload IA + aceite humano"
    descricao: |
      Valida o componente UploadLoteIA contexto=cadastro_empresa.
      User loga, abre tela Empresa, faz upload de PDF do contrato social,
      IA extrai dados, user revisa, marca aceite e salva.
    pre_condicoes:
      - "Usuario logado como pasteur@valida.com"
      - "Empresa nao cadastrada ainda no ciclo"
    passos:
      - id: passo_00_login
        titulo: "Login pasteur"
        acao:
          tipo: navegacao
          url: "/login"
        asserts_rede:
          - url_contem: "/api/auth/login"
            metodo: POST
            status_in: [200]
      - id: passo_01_navegar_empresa
        titulo: "Sidebar > Configuracoes > Empresa"
        acao:
          tipo: evaluate
          valor_literal: |
            () => {
              const cfg = [...document.querySelectorAll('button.nav-section-header')]
                .find(b => /Configuracoes|Configurações/i.test(b.textContent || ''));
              if (!cfg) throw new Error('Configuracoes nao achado');
              if (!cfg.classList.contains('expanded')) cfg.click();
              return 'ok';
            }
        asserts_dom:
          - selector: 'h1:has-text("Empresa"), h1:has-text("Dados da Empresa")'
      - id: passo_02_validar_componente_upload_lote_ia
        titulo: "Valida que UploadLoteIA aparece"
        acao:
          tipo: evaluate
          valor_literal: |
            () => {
              const titulo = document.body.innerText;
              const tem = /Cadastro Autom[áa]tico|Upload em Massa|Upload em Lote|UploadLoteIA/i.test(titulo);
              if (!tem) throw new Error('Componente UploadLoteIA nao renderizado');
              return 'ok_componente_presente';
            }
    pontos_observacao:
      - "Fluxo de upload+IA+aceite cobre F01-01"
      - "Componente UploadLoteIA renderiza no DOM"

  - id: UC-ARN-02
    obs: F01-02
    titulo: "Inscricao Estadual obrigatoria"
    descricao: |
      Valida que a IE eh required no CRUD de empresas.
      Tenta criar empresa SEM IE -> erro 400. Cria COM IE -> 201.
    passos:
      - id: passo_00_navegar_crud_empresas
        titulo: "Navega para CRUD de empresas"
        acao:
          tipo: navegacao
          url: "/crud/empresas"
        asserts_dom:
          - selector: 'h1:has-text("Empresas"), h2:has-text("Empresas")'
      - id: passo_01_validar_label_required
        titulo: "Label IE tem asterisco"
        acao:
          tipo: evaluate
          valor_literal: |
            () => {
              const labels = [...document.querySelectorAll('label')];
              const ie = labels.find(l => /Inscri[cç][aã]o\s*Estadual/i.test(l.textContent || ''));
              if (!ie) throw new Error('Label IE nao encontrada');
              const asterisco = ie.querySelector('.form-field-required, .required');
              if (!asterisco) throw new Error('IE nao tem asterisco (nao eh required no front)');
              return 'ie_eh_required';
            }
    pontos_observacao:
      - "Form mostra IE como obrigatoria (asterisco vermelho)"

  - id: UC-ARN-03
    obs: F01-03
    titulo: "Vincular empresa-usuario sem re-login"
    descricao: |
      Valida que apos vincular um usuario a uma empresa via /api/admin/associar-empresa,
      a lista 'minhasEmpresasList' do AuthContext atualiza sem precisar logout/login.
    passos:
      - id: passo_00_pegar_lista_inicial
        titulo: "Snapshot da lista de empresas vinculadas (antes)"
