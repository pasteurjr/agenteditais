    - Campo 'Numero' tem input proprio (curto, lado direito)
    - Campo 'Complemento (opcional)' tem input separado
    - Campo 'Bairro' tem input separado abaixo
    - Cada campo aceita digitacao independente
    - Layout em form-grid (2+ colunas) — nao uma textarea unica
    acao:
      tipo: evaluate
      valor_literal: "() => {\n  // F01-07: 4 inputs separados (nao apenas labels). Labels reais: 'Logradouro (Rua/Avenida)', 'Número', 'Complemento (opcional)', 'Bairro'\n  const labels = [...document.querySelectorAll('label')];\n  const map = {\n    'Logradouro': /Logradouro/i,\n    'Numero': /^\\s*N[uú]mero\\s*$/i,\n    'Complemento': /Complemento/i,\n    'Bairro': /^\\s*Bairro\\s*$/i,\n  };\n  const faltam = [];\n  const ok = [];\n  for (const [nome, re] of Object.entries(map)) {\n    const lbl = labels.find(l => re.test(l.textContent || ''));\n    if (!lbl) { faltam.push(nome+'_label'); continue; }\n    const wrapper = lbl.closest('.form-field') || lbl.parentElement;\n    const inp = wrapper?.querySelector('input, textarea');\n    if (!inp) { faltam.push(nome+'_input'); continue; }\n    ok.push(`${nome}=${inp.tagName.toLowerCase()}(${(inp.value||'').slice(0,15)})`);\n  }\n  if (faltam.length) throw new Error(`F01-07 incompleto. Faltando: ${faltam.join(', ')}`);\n  return `F01-07_4_inputs_OK ${ok.join(' | ')}`;\n}"
