    titulo: "Endereco estruturado: 4 campos novos"
    descricao: |
      Valida que EmpresaPage tem campos Logradouro/Numero/Complemento/Bairro
      separados, e que CEP popula automaticamente via ViaCEP.
    passos:
      - id: passo_00_navegar_empresa
        titulo: "Navega para EmpresaPage"
        acao:
          tipo: navegacao
          url: "/empresa"
      - id: passo_01_verificar_4_campos
        titulo: "Logradouro, Numero, Complemento, Bairro presentes"
        acao:
          tipo: evaluate
          valor_literal: |
            () => {
              const txt = document.body.innerText;
              const faltando = [];
              for (const campo of ['Logradouro', 'Número', 'Complemento', 'Bairro']) {
                if (!txt.includes(campo)) faltando.push(campo);
              }
              if (faltando.length) throw new Error(`Campos faltando: ${faltando.join(', ')}`);
              return 'F01-07_4_campos_OK';
            }
      - id: passo_02_verificar_dados_no_banco
        titulo: "SQL confirma colunas no banco"
        acao:
          tipo: evaluate
          valor_literal: |
            async () => {
              const token = localStorage.getItem('editais_ia_access_token');
              const r = await fetch('/api/crud/empresas?limit=1', {headers:{Authorization:`Bearer ${token}`}});
              const data = await r.json();
              const e = (data.items || [])[0];
              if (!e) return 'sem_empresa_ainda';
              const tem_colunas = 'endereco_numero' in e && 'endereco_complemento' in e && 'bairro' in e;
              if (!tem_colunas) throw new Error(`Colunas faltando no JSON: ${Object.keys(e).filter(k=>k.startsWith('endereco_')||k==='bairro')}`);
              return `F01-07_banco_OK numero=${e.endereco_numero} complemento=${e.endereco_complemento} bairro=${e.bairro}`;
            }

