  - id: UC-ARN-24
    obs: F13-01
    titulo: "UNIQUE area/classe + erro amigavel"
    descricao: |
      POST /api/crud/areas-produto duas vezes com mesmo nome -> 2a retorna 409
      com mensagem "Ja existe uma Area com este nome".
    passos:
      - id: passo_00_criar_area_1
        titulo: "POST area 1 (deve dar 200)"
        acao:
          tipo: evaluate
          valor_literal: |
            async () => {
              const token = localStorage.getItem('editais_ia_access_token');
              const r = await fetch('/api/crud/areas-produto', {
                method: 'POST',
                headers: {'Content-Type':'application/json', Authorization:`Bearer ${token}`},
                body: JSON.stringify({nome: 'AREA TESTE ARN24'}),
              });
              if (!r.ok && r.status !== 409) throw new Error(`POST 1 falhou: ${r.status}`);
              window.__arn24_id = (await r.json()).id;
              return r.status === 409 ? 'ja_existe' : 'criada';
            }
      - id: passo_01_criar_area_duplicada
        titulo: "POST area duplicada (deve dar 409)"
        acao:
          tipo: evaluate
          valor_literal: |
            async () => {
              const token = localStorage.getItem('editais_ia_access_token');
              const r = await fetch('/api/crud/areas-produto', {
                method: 'POST',
                headers: {'Content-Type':'application/json', Authorization:`Bearer ${token}`},
                body: JSON.stringify({nome: 'AREA TESTE ARN24'}),
              });
              if (r.status !== 409) throw new Error(`Esperado 409, achou ${r.status}`);
              const data = await r.json();
              if (!/Area|UNIQUE|unicidade|j[áa] existe/i.test(data.error || '')) {
                throw new Error(`Mensagem nao amigavel: ${data.error}`);
              }
              return `F13-01_unique_OK msg="${(data.error || '').slice(0,80)}"`;
            }
      - id: passo_02_cleanup
        titulo: "Apaga a area de teste"
        acao:
          tipo: evaluate
          valor_literal: |
            async () => {
              if (!window.__arn24_id) return 'sem_id_skip';
              const token = localStorage.getItem('editais_ia_access_token');
              await fetch(`/api/crud/areas-produto/${window.__arn24_id}`, {
                method: 'DELETE',
                headers: {Authorization:`Bearer ${token}`}
              });
              return 'cleanup_OK';
            }

  - id: UC-ARN-25
    obs: F03-03-e2e
    titulo: "E2E: upload IA + aceite + log auditoria"
    descricao: |
      Smoke E2E: aceite-ia endpoint funcional + tabela existe + auth ok.
    passos:
      - id: passo_00_e2e_aceite
        titulo: "E2E aceite IA registra log"
        acao:
          tipo: evaluate
          valor_literal: |
            async () => {
              const token = localStorage.getItem('editais_ia_access_token');
              const r = await fetch('/api/auditoria/aceite-ia', {
                method: 'POST',
                headers: {'Content-Type':'application/json', Authorization:`Bearer ${token}`},
                body: JSON.stringify({
                  contexto: 'arn25_e2e',
                  recurso_id: 'test-' + Date.now(),
                  dados_extraidos_ia: {tipo: 'contrato_social', razao_social: 'Teste E2E'},
                  dados_aceitos_user: {tipo: 'contrato_social', razao_social: 'Teste E2E'},
                }),
              });
              if (!r.ok) throw new Error(`E2E aceite falhou: ${r.status}`);
              const data = await r.json();
              return `F03-03_e2e_OK id=${data.id?.slice(0,8)}`;
            }
        asserts_rede:
          - url_contem: "/api/auditoria/aceite-ia"
            metodo: POST
            status_in: [200]
