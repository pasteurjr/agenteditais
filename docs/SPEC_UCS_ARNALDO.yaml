- id: UC-ARN-21
  obs: F04-07
  titulo: Magic bytes %PDF rejeita HTML renomeado
  descricao: 'Upload de arquivo nao-PDF (HTML com extensao .pdf) deve retornar 400

    com erro indicando bytes invalidos.

    '
  passos:
  - id: passo_00_validar_helper
    titulo: Upload HTML como .pdf rejeita (helper magic bytes funciona)
    acao:
      tipo: evaluate
      valor_literal: "async () => {\n  const token = localStorage.getItem('editais_ia_access_token');\n  // Pega 1 cert real\n  const r_list = await fetch('/api/crud/empresa-certidoes?limit=1', {headers:{Authorization:`Bearer ${token}`}});\n  if (!r_list.ok) throw new Error(`Lista certidoes falhou ${r_list.status}`);\n  const data = await r_list.json();\n  const certs = data.items || data.dados || [];\n  if (certs.length === 0) {\n    return 'F04-07_sem_certidoes_para_upload (helper esta no codigo, nao verificavel sem dados)';\n  }\n  const cert_id = certs[0].id;\n  // Upload HTML disfarcado de PDF\n  const html = '<html><body>fake</body></html>';\n  const blob = new Blob([html], {type: 'application/pdf'});\n  const fd = new FormData();\n  fd.append('file', blob, 'fake.pdf');\n  const r = await fetch(`/api/empresa-certidoes/${cert_id}/upload`, {\n    method: 'POST', headers: {Authorization: `Bearer ${token}`}, body: fd\n  });\n  if (r.status >= 200 && r.status < 300) {\n    throw new Error(`F04-07 NAO corrigido: HTML aceito como PDF (status ${r.status})`);\n  }\n  const body = await r.text();\n  // Backend retorna {error: \"...\", magic_bytes_invalidos: true}\n  const tem_msg = /magic_bytes_invalidos|n[ãa]o.*PDF v[áa]lido|formato|bytes invalid/i.test(body);\n  if (!tem_msg) {\n    throw new Error(`F04-07 incompleto: rejeitou (${r.status}) mas mensagem nao indica problema PDF: ${body.slice(0,200)}`);\n  }\n  return `F04-07_OK status=${r.status} cert=${cert_id.slice(0,8)} msg_pdf=true`;\n}"
    descricao_passo: 'Confirma F04-07: helper _arquivo_eh_pdf_valido rejeita HTML disfarcado de PDF com 400 + mensagem sobre PDF/bytes/formato. Faz upload real de fake.pdf (HTML).'
    pontos_observacao:
    - Endpoint /api/empresa-certidoes/<id>/upload existe
    - Helper _arquivo_eh_pdf_valido implementado (app.py linha 62)
    - Upload de HTML disfarcado retorna 400 com mensagem mencionando PDF/bytes/formato
    asserts_dom: *id001
  pontos_observacao:
  - HTML disfarcado de PDF rejeitado com mensagem mencionando PDF/bytes/formato
  dados_pre_condicoes:
  - Helper _arquivo_eh_pdf_valido em backend/app.py linha 62
  - Backend rejeita upload de HTML disfarcado de PDF com 400 + mensagem PDF/bytes
- id: UC-ARN-22
  obs: F04-08
  titulo: CRF FGTS persiste arquivo_path
  descricao: 'Backend sempre salva path quando scraper retorna PDF. Valida via

    consulta a certidoes existentes que tenham path nao-NULL.

    '
  passos:
