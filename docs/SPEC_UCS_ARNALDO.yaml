      valor_literal: "() => {\n  // F01-08: chave EXATA confirmada via DOM real: 'facilicita_sidebar_sections_v1'\n  const v = localStorage.getItem('facilicita_sidebar_sections_v1');\n  if (!v) throw new Error('localStorage NAO tem chave facilicita_sidebar_sections_v1 — F01-08 nao implementado');\n  let arr;\n  try { arr = JSON.parse(v); } catch { throw new Error(`localStorage nao eh JSON valido: ${v}`); }\n  if (!Array.isArray(arr)) throw new Error(`Esperado Array, achou ${typeof arr}: ${v}`);\n  if (!arr.includes('cadastros')) {\n    throw new Error(`Chave existe mas 'cadastros' NAO esta na lista (esperado depois de expandir): ${v}`);\n  }\n  return `F01-08_localStorage_OK array contem cadastros: [${arr.join(',')}]`;\n}"
