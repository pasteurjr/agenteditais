sprint:
  numero: 10
  nome: Sprint 10 — Correcoes Arnaldo
  projeto_id: 00000000-0000-0000-0000-000000000001
  ciclo_id_default: arnaldo-correcoes-v1
ucs:
- id: UC-ARN-01
  obs: F01-01
  titulo: Cadastro de empresa via upload IA + aceite humano
  descricao: 'Valida o componente UploadLoteIA contexto=cadastro_empresa.

    User loga, abre tela Empresa, faz upload de PDF do contrato social,

    IA extrai dados, user revisa, marca aceite e salva.

    '
  pre_condicoes:
  - Usuario logado como pasteur@valida.com
  - Empresa nao cadastrada ainda no ciclo
  passos:
  - id: passo_00_login
    titulo: Login pasteur
    acao:
      tipo: navegacao
      url: /login
    asserts_rede:
    - url_contem: /api/auth/login
      metodo: POST
      status_in:
      - 200
    descricao_passo: Tester preenche email/senha e clica Entrar. Sistema autentica via /api/auth/login e redireciona ao Dashboard.
    pontos_observacao:
    - Tela de login do facilicita.ia aparece com campos email + senha
    - Botao 'Entrar' visivel e habilitado
    - Apos preencher e clicar Entrar, redireciona para Dashboard sem erro
  - id: passo_01_navegar_empresa
    titulo: Sidebar > Configuracoes > Empresa (expande secao + clica item Empresa)
    acao:
      tipo: evaluate
      valor_literal: "async () => {\n  const sec = [...document.querySelectorAll('button.nav-section-header')]\n    .find(b => /Configura/i.test(b.textContent || ''));\n  if (!sec) throw new Error('Secao \"Configura\" nao achada');\n  if (!sec.classList.contains('expanded')) { sec.click(); await new Promise(r=>setTimeout(r,400)); }\n  if (!sec.classList.contains('expanded')) { sec.click(); await new Promise(r=>setTimeout(r,400)); }\n  const it = [...document.querySelectorAll('button.nav-item')]\n    .find(el => /^\\s*Empresa\\s*$/i.test(el.querySelector('.nav-item-label')?.textContent?.trim() || ''));\n  if (!it) throw new Error('Item \"Empresa\" nao achado em \"Configura\"');\n  it.click();\n  await new Promise(r => setTimeout(r, 1500));\n  return 'navegou_2niveis_Configura_Empresa';\n}"
    asserts_dom:
    - selector: h1:has-text("Dados da Empresa")
    descricao_passo: Tester clica Sidebar > Configuracoes (expande) > Empresa. Tela carrega com dados Bio-Hosp ja cadastrada.
    pontos_observacao:
    - Sidebar lateral mostra secao 'Configuracoes' que expande ao clicar
    - Item 'Empresa' aparece dentro de Configuracoes
    - Apos clicar, conteudo principal mostra 'Dados da Empresa'
  - id: passo_02_validar_componente_upload_lote_ia
    titulo: UploadLoteIA cadastro_empresa renderiza SE empresa nao cadastrada (caso contrario form de edicao)
    acao:
      tipo: evaluate
      valor_literal: "async () => {\n  const r = await fetch('/api/auth/user', {headers:{Authorization:`Bearer ${localStorage.getItem('editais_ia_access_token')}`}});\n  const u = await r.json();\n  const tem_empresa = u.has_empresa === true;\n  const txt = document.body.innerText;\n  // Quando empresa existe: heading \"Cadastro Automático de Documentos por IA\" (contexto=documentos)\n  // mas NAO heading \"Cadastro Automático por IA — envie contrato social\" (contexto=cadastro_empresa)\n  const tem_doc = /Cadastro Autom[áa]tico.*Documentos/i.test(txt);\n  const tem_emp = /envie contrato social|Cadastro Autom[áa]tico por IA — envie/i.test(txt);\n  if (tem_empresa) {\n    if (tem_emp) throw new Error('Empresa existe mas heading cadastro_empresa AINDA renderiza — bug F01-01');\n    if (!tem_doc) throw new Error('Empresa existe mas componente UploadLoteIA documentos NAO renderiza');\n    return `F01-01_OK empresa_existe heading_documentos=true heading_empresa=false (correcao funciona — componente troca contexto)`;\n  } else {\n    if (!tem_emp) throw new Error('Empresa nova mas heading cadastro_empresa NAO renderiza');\n    return `F01-01_OK empresa_nova heading_empresa=true`;\n  }\n}"
    descricao_passo: 'Verifica logica condicional: UploadLoteIA contexto=cadastro_empresa SO renderiza se empresa NAO existe. Como Bio-Hosp ja existe, NAO deve mostrar (comportamento esperado).'
    pontos_observacao:
    - 'Se empresa NAO cadastrada: aparece secao ''Cadastro Automatico por IA — envie contrato social'''
    - 'Se empresa JA cadastrada (Bio-Hosp): NAO mostra essa secao (form de edicao normal)'
    - Comportamento condicional confirma logica F01-01 (componente so aparece em fluxo de cadastro)
    asserts_dom: &id001
    - selector: body
  pontos_observacao:
  - Componente UploadLoteIA renderiza com testid OU heading especifico (nao generico)
  - Componente tem botao de selecionar arquivo
  dados_pre_condicoes:
  - Usuario logado como super (arnaldo@valida.com / 123456)
  - Empresa Bio-Hosp ja cadastrada — fluxo nao-cadastro
  - Componente UploadLoteIA contexto=cadastro_empresa renderiza apenas quando empresa nao existe (logica condicional)
- id: UC-ARN-02
  obs: F01-02
  titulo: Inscricao Estadual obrigatoria
  descricao: 'Valida que a IE eh required no CRUD de empresas: label tem asterisco

    e attribute required no input.

    '
  passos:
  - id: passo_00_navegar_crud_empresas
    titulo: Sidebar > Cadastros > Empresa (route /crud/empresas pode ser super-only)
    acao:
      tipo: evaluate
      valor_literal: "async () => {\n  const sec = [...document.querySelectorAll('button.nav-section-header')]\n    .find(b => /Configura/i.test(b.textContent || ''));\n  if (!sec) throw new Error('Secao \"Configura\" nao achada');\n  if (!sec.classList.contains('expanded')) { sec.click(); await new Promise(r=>setTimeout(r,400)); }\n  if (!sec.classList.contains('expanded')) { sec.click(); await new Promise(r=>setTimeout(r,400)); }\n  const it = [...document.querySelectorAll('button.nav-item')]\n    .find(el => /^\\s*Empresa\\s*$/i.test(el.querySelector('.nav-item-label')?.textContent?.trim() || ''));\n  if (!it) throw new Error('Item \"Empresa\" nao achado em \"Configura\"');\n  it.click();\n  await new Promise(r => setTimeout(r, 1500));\n  return 'navegou_2niveis_Configura_Empresa';\n}"
    asserts_dom:
    - selector: h1:has-text("Dados da Empresa")
    descricao_passo: Tester acessa CRUD de empresas via Sidebar > Cadastros (super-only) > Empresa. Lista de empresas carrega.
    pontos_observacao:
    - Sidebar > Cadastros > Empresa abre tela com lista de empresas
    - Header da tela diz 'Empresas' (h1 ou h2)
    - Lista carrega sem erro, mostrando empresas existentes
  - id: passo_01_validar_label_required
    titulo: Label IE tem asterisco vermelho indicando required
    acao:
      tipo: evaluate
      valor_literal: "() => {\n  // F01-02: IE deve ter asterisco vermelho (form-field-required) — frontend usa span estilizado, nao attr required\n  const labels = [...document.querySelectorAll('label')];\n  const ie = labels.find(l => /Inscri[cç][aã]o\\s*Estadual/i.test(l.textContent || ''));\n  if (!ie) throw new Error('Label \"Inscricao Estadual\" nao achada na pagina');\n  // Procura asterisco (span.form-field-required ou texto literal '*')\n  const span = ie.querySelector('.form-field-required, .required, .asterisco-required');\n  const tem_span = !!span;\n  const tem_asterisco_no_texto = /\\*/.test(ie.textContent || '');\n  if (!tem_span && !tem_asterisco_no_texto) {\n    throw new Error('Label IE NAO tem asterisco visual — F01-02 nao corrigido. Texto: \"' + ie.textContent + '\"');\n  }\n  // Se tem span, valida que cor eh vermelha\n  let cor_vermelha = false;\n  if (span) {\n    const cor = getComputedStyle(span).color;\n    cor_vermelha = /rgb\\((2[0-9]{2}|1[5-9][0-9])/.test(cor) || cor.includes('rgb(255');\n  }\n  return `F01-02_OK label=\"${ie.textContent.trim()}\" span_required=${tem_span} cor_vermelha=${cor_vermelha} asterisco_texto=${tem_asterisco_no_texto}`;\n}"
    descricao_passo: 'Confirma observacao Arnaldo F01-02: campo Inscricao Estadual deve ter asterisco vermelho indicando required (antes era ambiguo).'
    pontos_observacao:
    - Form Novo Empresa tem label 'Inscricao Estadual'
    - Label tem asterisco vermelho '*' indicando required (cor visivelmente vermelha, nao cinza)
    - Asterisco fica imediatamente apos o texto 'Inscricao Estadual'
    - Outros campos required tambem tem asterisco no mesmo padrao
    asserts_dom: *id001
  pontos_observacao:
  - Label tem asterisco vermelho E input tem attribute required
  dados_pre_condicoes:
  - Frontend CRUD de empresas tem campo Inscricao Estadual marcado required no JSX
  - Label IE renderiza span.form-field-required (asterisco vermelho)
- id: UC-ARN-03
  obs: F01-03
  titulo: Vincular empresa-usuario sem re-login
  descricao: 'Valida que apos vincular um usuario a uma empresa via /api/admin/associar-empresa,

    a lista ''minhasEmpresasList'' do AuthContext atualiza sem precisar logout/login.

    '
  passos:
  - id: passo_00_pegar_lista_inicial
    titulo: Snapshot da lista de empresas vinculadas (antes)
    acao:
      tipo: evaluate
      valor_literal: "async () => {\n  const token = localStorage.getItem('editais_ia_access_token');\n  const r = await fetch('/api/auth/minhas-empresas', {headers:{Authorization:`Bearer ${token}`}});\n  if (!r.ok) throw new Error(`/api/auth/minhas-empresas retornou ${r.status}`);\n  const data = await r.json();\n  const lista = data.empresas || data.items || data || [];\n  const n = Array.isArray(lista) ? lista.length : 0;\n  if (n < 1) throw new Error('Usuario sem empresas vinculadas — pre-cond falhou');\n  window.__lista_antes = n;\n  return `F01-03_OK lista_atual=${n}`;\n}"
    descricao_passo: Antes de associar nova empresa, tester captura snapshot da lista atual via /api/auth/minhas-empresas.
    pontos_observacao:
    - API /api/auth/minhas-empresas retorna 200
    - Resposta contem array de empresas vinculadas ao usuario
    - Quantidade > 0 (Bio-Hosp ao menos)
    asserts_rede:
    - url_contem: /api/auth/minhas-empresas
      metodo: GET
      status_in:
      - 200
    asserts_dom: *id001
  - id: passo_01_validar_endpoint_existe
    titulo: Confirma endpoint /api/admin/associar-empresa existe (OPTIONS/HEAD)
    acao:
      tipo: evaluate
      valor_literal: "async () => {\n  const token = localStorage.getItem('editais_ia_access_token');\n  const r = await fetch('/api/admin/associar-empresa', {\n    method: 'POST', headers: {'Content-Type':'application/json', Authorization:`Bearer ${token}`}, body: JSON.stringify({})\n  });\n  if (r.status === 404) throw new Error('Endpoint /api/admin/associar-empresa NAO existe (404) — F01-03 nao deployado');\n  // Esperado: 400/422 (payload vazio) ou 200/201 — qualquer coisa que prova existencia\n  return `F01-03_endpoint_existe status=${r.status}`;\n}"
    descricao_passo: Confirma que rota POST /api/admin/associar-empresa existe (responde nao-404). Endpoint completo testavel manualmente com payload.
    pontos_observacao:
    - POST /api/admin/associar-empresa NAO retorna 404 (rota existe)
    - Status pode ser 400/422 (payload invalido) ou 200/201 — qualquer coisa que nao 404
    asserts_dom: *id001
  pontos_observacao:
  - Endpoint /api/admin/associar-empresa existe (nao 404)
  - Lista de empresas vinculadas existe no AuthContext
  dados_pre_condicoes:
  - Endpoint POST /api/admin/associar-empresa existe (super-only)
  - AuthContext expoe minhasEmpresasList que atualiza apos POST sem re-login
- id: UC-ARN-04
  obs: F01-04
  titulo: CNPJ readonly apos empresa salva
  descricao: 'Cria empresa, recarrega EmpresaPage e verifica que input CNPJ esta disabled.

    Falha se input estiver editavel quando empresa ja existe.

    '
  dados_pre_condicoes:
  - Empresa Bio-Hosp (CNPJ 33.682.845/3710-64) ja cadastrada
  - Frontend EmpresaPage.tsx renderiza input CNPJ com `disabled={!!empresaId}`
  passos:
  - id: passo_00_navegar_empresa
    titulo: Navega para EmpresaPage via sidebar Configurações > Empresa
    descricao_passo: Tester acabou de clicar Sidebar > Configuracoes > Empresa. Pagina carrega mostrando dados cadastrais da empresa Bio-Hosp ja existente.
    pontos_observacao:
    - Header mostra 'Dados da Empresa' (h1) ou 'Empresa'
    - Sidebar 'Configuracoes' expandida com 'Empresa' destacado
    - Form carregou sem mensagens de erro/loading travado
    acao:
      tipo: evaluate
      valor_literal: "async () => {\n  const sec = [...document.querySelectorAll('button.nav-section-header')]\n    .find(b => /Configura/i.test(b.textContent || ''));\n  if (!sec) throw new Error('Secao \"Configura\" nao achada');\n  if (!sec.classList.contains('expanded')) { sec.click(); await new Promise(r=>setTimeout(r,400)); }\n  if (!sec.classList.contains('expanded')) { sec.click(); await new Promise(r=>setTimeout(r,400)); }\n  const it = [...document.querySelectorAll('button.nav-item')]\n    .find(el => /^\\s*Empresa\\s*$/i.test(el.querySelector('.nav-item-label')?.textContent?.trim() || ''));\n  if (!it) throw new Error('Item \"Empresa\" nao achado em \"Configura\"');\n  it.click();\n  await new Promise(r => setTimeout(r, 1500));\n  return 'navegou_2niveis_Configura_Empresa';\n}"
    asserts_dom:
    - selector: h1:has-text("Dados da Empresa")
  - id: passo_01_verificar_cnpj_readonly
    titulo: 'F01-04: CNPJ deve estar DISABLED quando empresa ja existe'
    descricao_passo: ESTE PASSO E A CORE DA OBSERVACAO F01-04. Apos salvar empresa, CNPJ NAO pode mais ser editavel (chave fiscal — alterar descaracteriza). Cruza /api/auth/user (has_empresa) + DOM (input.disabled).
    pontos_observacao:
    - Campo CNPJ aparece preenchido com '33.682.845/3710-64'
    - Visualmente o campo CNPJ esta esmaecido/cinza (cor diferente dos editaveis)
    - Cursor sobre o campo NAO muda para text/I-beam
    - Tentativa de clicar e digitar no CNPJ NAO produz alteracao visual
    - 'Hint visivel: ''CNPJ nao editavel apos cadastro'' ou similar'
    - Outros campos (Nome Fantasia, IE) continuam editaveis normalmente
    acao:
      tipo: evaluate
      valor_literal: "async () => {\n  const token = localStorage.getItem('editais_ia_access_token');\n  const r = await fetch('/api/auth/user', {headers:{Authorization:`Bearer ${token}`}});\n  if (!r.ok) throw new Error(`/api/auth/user ${r.status}`);\n  const u = await r.json();\n  if (!u.has_empresa || !u.empresa) {\n    throw new Error('Pre-cond falhou: usuario sem empresa cadastrada — fluxo F01-04 (CNPJ disabled apos cadastro) nao se aplica');\n  }\n  // CNPJ deve estar disabled E label deve dizer \"(nao editavel apos cadastro)\"\n  const labels = [...document.querySelectorAll('label')];\n  const cnpj_label = labels.find(l => /^\\s*CNPJ/i.test(l.textContent || ''));\n  if (!cnpj_label) throw new Error('Label CNPJ nao achado');\n  const txt_label = cnpj_label.textContent || '';\n  const tem_hint = /n[ãa]o edit[áa]vel|readonly|n[ãa]o pode ser alterado/i.test(txt_label);\n  const wrapper = cnpj_label.closest('.form-field') || cnpj_label.parentElement;\n  const input = wrapper.querySelector('input');\n  if (!input) throw new Error('Input CNPJ nao achado dentro do wrapper');\n  if (!input.disabled) {\n    throw new Error(`Empresa JA EXISTE (id=${u.empresa.id}) mas input CNPJ EDITAVEL — bug F01-04 NAO corrigido`);\n  }\n  if (!tem_hint) {\n    throw new Error(`Input disabled mas label nao tem hint \"nao editavel\": \"${txt_label}\"`);\n  }\n  return `F01-04_OK label=\"${txt_label.trim()}\" disabled=true valor=${input.value} hint=true`;\n}"
    asserts_rede:
    - url_contem: /api/auth/user
      metodo: GET
      status_in:
      - 200
  pontos_observacao:
  - 'CNPJ desabilitado quando empresa ja salva (cruzado: confirma empresa existe E input.disabled)'
- id: UC-ARN-05
  obs: F01-05
  titulo: Sidebar Configuracoes mantem labels curtos
  descricao: 'Confirma que sidebar tem itens ''Empresa'', ''Portfolio'', ''Parametrizacoes'', ''Selecionar Empresa''

    como labels curtos (compatibilidade com tutoriais existentes).

    '
  passos:
  - id: passo_00_validar_labels
    titulo: Verifica labels exatos na sidebar Configuracoes expandida
    acao:
      tipo: evaluate
      valor_literal: "async () => {\n  // Garante Configuracoes expandida\n  const cfg = [...document.querySelectorAll('button.nav-section-header')]\n    .find(b => /Configura/i.test(b.textContent || ''));\n  if (!cfg) throw new Error('Secao Configuracoes nao achada');\n  if (!cfg.classList.contains('expanded')) { cfg.click(); await new Promise(r=>setTimeout(r,400)); }\n  // Pega itens DEPOIS de expandir\n  await new Promise(r=>setTimeout(r,200));\n  const all_items = [...document.querySelectorAll('button.nav-item')]\n    .map(el => el.querySelector('.nav-item-label')?.textContent?.trim() || el.textContent?.trim() || '');\n  const esperados = ['Empresa', 'Portfolio', 'Parametrizacoes', 'Selecionar Empresa'];\n  const faltam = esperados.filter(e => !all_items.some(i => i === e));\n  if (faltam.length) throw new Error(`Labels faltando em Configuracoes: ${faltam.join(', ')}. Encontrados: ${all_items.join('|').slice(0,300)}`);\n  return `F01-05_OK labels_curtos_OK ${esperados.join('|')}`;\n}"
    descricao_passo: 'Confirma F01-05: sidebar mantem labels curtos (Empresa, Portfolio, Parametrizacoes, Selecionar Empresa) — nao versoes longas com parenteses.'
    pontos_observacao:
    - Sidebar > Configuracoes contem item 'Empresa' (label curto, nao 'Dados da Empresa (visao integrada)')
    - Sidebar > Configuracoes contem item 'Portfolio'
    - Sidebar > Configuracoes contem item 'Parametrizacoes'
    - Sidebar > Configuracoes contem item 'Selecionar Empresa'
    - Labels sao curtos, sem texto longo entre parenteses
    asserts_dom: *id001
  pontos_observacao:
  - Sidebar Configuracoes mostra exatamente os 4 labels esperados
  dados_pre_condicoes:
  - Sidebar lateral com secao Configuracoes
  - 'Itens esperados: Empresa, Portfolio, Parametrizacoes, Selecionar Empresa'
- id: UC-ARN-06
  obs: F01-06
  titulo: Documentos vem do upload IA do cadastro
  descricao: 'Apos UploadLoteIA contexto=cadastro_empresa, valida que documentos

    classificados aparecem em empresa-documentos. Confirma com data-testid.

    '
  passos:
  - id: passo_00_validar_componente_upload_documentos
    titulo: UploadLoteIA contexto=documentos visivel na EmpresaPage
    acao:
      tipo: evaluate
      valor_literal: "async () => {\n  const sec = [...document.querySelectorAll('button.nav-section-header')]\n    .find(b => /Configura/i.test(b.textContent || ''));\n  if (!sec) throw new Error('Secao \"Configura\" nao achada');\n  if (!sec.classList.contains('expanded')) { sec.click(); await new Promise(r=>setTimeout(r,400)); }\n  if (!sec.classList.contains('expanded')) { sec.click(); await new Promise(r=>setTimeout(r,400)); }\n  const it = [...document.querySelectorAll('button.nav-item')]\n    .find(el => /^\\s*Empresa\\s*$/i.test(el.querySelector('.nav-item-label')?.textContent?.trim() || ''));\n  if (!it) throw new Error('Item \"Empresa\" nao achado em \"Configura\"');\n  it.click();\n  await new Promise(r => setTimeout(r, 1500));\n  return 'navegou_2niveis_Configura_Empresa';\n}"
    descricao_passo: Tester navega para EmpresaPage onde upload em lote de documentos aparece.
    pontos_observacao:
    - EmpresaPage abre normalmente
    - Tela rolavel mostra secao de documentos no meio/fim da pagina
    asserts_dom:
    - selector: h1:has-text("Dados da Empresa")
  - id: passo_01_validar_componente_renderiza
    titulo: Confirma componente UploadLoteIA com texto real do componente
    acao:
      tipo: evaluate
      valor_literal: "() => {\n  // F01-06: heading especifico do componente UploadLoteIA contexto=documentos\n  const txt = document.body.innerText;\n  const heading = /Cadastro Autom[áa]tico de Documentos por IA|Upload em Massa.*IA classifica cada documento/i.test(txt);\n  if (!heading) throw new Error('F01-06: heading documentos NAO renderiza em EmpresaPage');\n  // Confirma componente tem dropzone (texto OU input[type=file])\n  const tem_drop = /Arraste|arraste|Solte|solte|drag|drop/i.test(txt);\n  const tem_input_file = !!document.querySelector('input[type=\"file\"]');\n  if (!tem_drop && !tem_input_file) throw new Error('F01-06 heading OK mas SEM dropzone E SEM input[type=file]');\n  return `F01-06_OK heading=true drop_text=${tem_drop} input_file=${tem_input_file}`;\n}"
    descricao_passo: 'Confirma F01-06: componente UploadLoteIA contexto=documentos plugado e renderizando na EmpresaPage.'
    pontos_observacao:
    - Componente 'Upload em Massa — IA classifica cada documento' aparece em algum lugar
    - OU 'Cadastro Automatico' presente
    - Componente tem botao de selecionar arquivos visivel
    asserts_dom: *id001
  pontos_observacao:
  - UploadLoteIA documentos com testid OU heading especifico de documentos
  dados_pre_condicoes:
  - EmpresaPage com componente UploadLoteIA contexto=documentos plugado (linha 1255 EmpresaPage.tsx)
- id: UC-ARN-07
  obs: F01-07
  titulo: 'Endereco estruturado: 4 campos novos'
  descricao: 'Valida que EmpresaPage tem campos Logradouro/Numero/Complemento/Bairro

    como inputs separados, e que SQL/API confirma colunas no banco.

    '
  dados_pre_condicoes:
  - Empresa Bio-Hosp herdada Sprint 1 V7 com endereco preenchido
  - Migration 051 aplicada (endereco_numero, endereco_complemento, bairro)
  - EmpresaPage com 4 inputs separados de endereco
  passos:
  - id: passo_00_navegar_empresa
    titulo: Navega para EmpresaPage via sidebar
    descricao_passo: Tester abre Sidebar > Configuracoes > Empresa. Tela carrega com dados Bio-Hosp e secao Endereco com 4 campos.
    pontos_observacao:
    - EmpresaPage abre com dados Bio-Hosp
    - Secao 'Endereco' visivel apos 'Presenca Digital'
    acao:
