    titulo: Existe ao menos 1 certidao com path_arquivo nao-NULL no banco
    acao:
      tipo: evaluate
      valor_literal: "async () => {\n  const token = localStorage.getItem('editais_ia_access_token');\n  const r = await fetch('/api/crud/empresa-certidoes?limit=50', {headers:{Authorization:`Bearer ${token}`}});\n  if (!r.ok) throw new Error(`API ${r.status}`);\n  const data = await r.json();\n  const items = data.items || data.dados || [];\n  if (items.length === 0) {\n    return 'F04-08_sem_certidoes (correcao no codigo, nao verificavel sem dados)';\n  }\n  // Conta certidoes com path nao-NULL\n  const com_path = items.filter(c => c.path_arquivo || c.arquivo_path || c.caminho_arquivo);\n  if (com_path.length === 0) {\n    throw new Error(`F04-08 NAO corrigido: ${items.length} certidoes mas TODAS com path NULL`);\n  }\n  return `F04-08_OK ${com_path.length}/${items.length} certidoes com path persistido`;\n}"
    descricao_passo: 'Confirma F04-08: backend salva path_arquivo mesmo quando scraper retorna PDF com status pendente. Verifica via API se ≥1 certidao tem path nao-NULL.'
    pontos_observacao:
