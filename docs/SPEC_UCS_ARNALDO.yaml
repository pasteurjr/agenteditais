      valor_literal: "async () => {\n  const cad = [...document.querySelectorAll('button.nav-section-header')]\n    .find(b => /Cadastros/i.test(b.textContent || ''));\n  if (!cad) throw new Error('Secao Cadastros nao achada');\n  // Idempotente: garante expanded=true\n  if (!cad.classList.contains('expanded')) { cad.click(); await new Promise(r=>setTimeout(r,400)); }\n  // Aguarda transition: ate 20 tentativas\n  for (let i = 0; i < 20; i++) {\n    if (cad.classList.contains('expanded')) break;\n    await new Promise(r=>setTimeout(r,100));\n  }\n  if (!cad.classList.contains('expanded')) throw new Error(`Cadastros nao expandiu. classes: ${cad.className}`);\n  return 'cadastros_expandido_OK';\n}"
