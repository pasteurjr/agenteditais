; Configuracao do framework de validacao automatica visual.
; Editar aqui em vez de passar flags na linha de comando.
; Os valores aqui sao usados como DEFAULT — flags na CLI sobrescrevem.

[visual]
; Porta do painel Flask de controle
porta_painel = 9876

; Delay (ms) entre operacoes baixas do Playwright (clicks, navegacao interna).
; NAO afeta velocidade de digitacao tecla-por-tecla.
slow_mo_ms = 80

; Delay (ms) entre cada tecla digitada — efeito de humano digitando.
; Referencia: 50ms ≈ 250 cpm (datilografia rapida); 100ms ≈ 120 cpm (medio); 200ms ≈ devagar.
delay_por_tecla_ms = 50

; Delay (ms) entre sub-acoes consecutivas dentro de um passo logico
; (ex: terminou de preencher email -> espera X ms -> comeca a senha)
pausa_entre_acoes_ms = 300

[login]
; Credenciais default (sobrescritas pelo contexto.yaml do ciclo, quando existe)
email = valida4@valida.com.br
senha = 123456
