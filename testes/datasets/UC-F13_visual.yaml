# UC-F13 V8: cria hierarquia Area/Classe/Subclasse pra empresa do ciclo.
# Cada CRUD eh empresa_scoped — empresa nova nasce sem nada.
# Tutorial cria 2 areas + 3 classes + 3 subclasses na ordem certa
# (classe precisa de area_id, subclasse precisa de classe_id).

hierarquia:
  areas:
    - nome: "Equipamentos Médico-Hospitalares"
    - nome: "Diagnóstico in Vitro e Laboratório"

  classes:
    - nome: "Monitoração"
      area_nome: "Equipamentos Médico-Hospitalares"
    - nome: "Reagentes Bioquímicos"
      area_nome: "Diagnóstico in Vitro e Laboratório"
    - nome: "Reagentes e Kits Diagnósticos"
      area_nome: "Diagnóstico in Vitro e Laboratório"

  subclasses:
    - nome: "Monitor Multiparamétrico"
      classe_nome: "Monitoração"
      ncm: "9018.19.90"
    - nome: "Reagente para Glicose"
      classe_nome: "Reagentes Bioquímicos"
      ncm: "3822.19.90"
    - nome: "Kit de Hematologia"
      classe_nome: "Reagentes e Kits Diagnósticos"
      ncm: "3822.19.90"

