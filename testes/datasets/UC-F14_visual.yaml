uc_id: UC-F14
trilha: visual
ciclo_id_default: piloto-ucf14

# UC-F14 — Configurar pesos e limiares de score
# Aba "Score" da ParametrizacoesPage. 2 cards:
#  1. Pesos das Dimensoes (6 campos number, devem somar 1.00)
#  2. Limiares de Decisao GO/NO-GO (6 campos: score_final, tecnico, juridico)
#
# Pre-condicoes de DADOS:
#  - parametros_score eh empresa-scoped (3 registros legados, 0 pra empresas DEMO).
#    Frontend chama ensureParamScore() no 1o save -> cria registro automaticamente.
#  - empresa criada (UC-F01) e vinculada (UC-F18) e selecionada como ativa
#    (predecessores ja registrados no banco testesvalidacoes em 30/04/2026 19h)

# V2 — Subcenario A (invalido, soma 1.05) e Subcenario B (corrigido, soma 1.00)
# conforme tutorial V8 (linhas 2165-2208).
peso_tecnico: "0.30"
peso_documental: "0.25"
peso_juridico: "0.20"
peso_logistico: "0.10"
peso_comercial: "0.10"
# Complexidade: 0.10 deixa a soma em 1.05 (BLOQUEAR); 0.05 corrige para 1.00.
peso_complexidade_invalido: "0.10"   # soma = 1.05 -> sistema deve rejeitar
peso_complexidade_valido: "0.05"     # soma = 1.00 -> sistema deve aceitar

# Limiares Score Final
limiar_final_go: "70"
limiar_final_nogo: "40"
# Limiares Score Tecnico
limiar_tecnico_go: "60"
limiar_tecnico_nogo: "30"
# Limiares Score Juridico
limiar_juridico_go: "60"
limiar_juridico_nogo: "30"

usuario:
  email: "{{EMAIL_PRINCIPAL}}"
  senha: "{{SENHA_PRINCIPAL}}"
