# Cenario B (Opcao B): super valida<N> sem vinculos cria empresa via FA-07.A
# (preenche TODOS os campos do CRUD generico) e depois completa redes sociais
# na EmpresaPage (campos que so existem la).
#
# Placeholders sao resolvidos em runtime pelo executor (dados/placeholders.py):
#   {{CNPJ_UNICO}}        - CNPJ valido RF, gerado por ciclo (context_manager)
#   {{EMAIL_PRINCIPAL}}   - email valida<N>@valida.com.br do user do ciclo
#   {{SENHA_PRINCIPAL}}   - senha do user
#   {{IE_UNICA}}          - inscricao estadual deterministica do hash do ciclo
#   {{IM_UNICA}}          - inscricao municipal idem
#   {{TELEFONE_UNICO}}    - telefone idem
#   {{SUFIXO_CICLO}}      - 8 chars finais do ciclo_id (ex: aa7e09bc)
# Ver docs/PROCESSO_CADASTRO_UC_NO_BANCO.md secao 5.

empresa:
  # Campos que existem no CRUD generico (preenchidos no passo 03)
  cnpj: "{{CNPJ_UNICO}}"
  razao_social: "DEMO {{SUFIXO_CICLO}} Comércio e Representações Ltda"
  nome_fantasia: "DEMO {{SUFIXO_CICLO}} Comércio"
  inscricao_estadual: "{{IE_UNICA}}"
  inscricao_municipal: "{{IM_UNICA}}"
  regime_tributario: "simples"
  porte: "me"
  endereco: "Av. da Validação, 1000"
  cidade: "São Paulo"
  uf: "SP"
  cep: "01000-000"
  telefone: "{{TELEFONE_UNICO}}"
  email: "contato+{{SUFIXO_CICLO}}@demo.com.br"

  # Campos que so existem na EmpresaPage (preenchidos depois)
  website: "https://demo-{{SUFIXO_CICLO}}.com.br"
  instagram: "demo_{{SUFIXO_CICLO}}"
  linkedin: "demo-{{SUFIXO_CICLO}}"
  facebook: "demo.{{SUFIXO_CICLO}}"

