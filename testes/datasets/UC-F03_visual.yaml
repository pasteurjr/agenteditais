# UC-F03 V2 — Gerir documentos da empresa (paridade Tutorial V8, 4 documentos)
# Cria 4 documentos via Modal "Upload de Documento" na EmpresaPage (V8 linhas 575-729):
#  1. Alvara / Licenca Sanitaria (validade 2026-06-30, vencimento proximo) -> badge Vence/Vencido
#  2. Autorizacao de Funcionamento ANVISA (AFE) (validade 2027-08-22) -> badge OK (verde)
#  3. Certificado ISO / Acreditacao (validade 2026-10-15) -> badge OK (verde)
#  4. Certidao Negativa Estadual (validade 2026-06-30, ja passada) -> badge Vencido (vermelho)
#
# Pre-condicoes de DADOS:
#  - categorias_documento (6 seed) e documentos_necessarios (21 seed) JA EXISTEM no banco editais (GLOBAL).
#  - Empresa vinculada e ativa: vem de UC-F01 + UC-F18 (predecessores).
#
# Pre-condicoes de ARQUIVOS:
#  - users.pasta_documentos_teste deve apontar para diretorio com PDFs reusaveis.
#  - Default no setup do tester: /home/pasteurjr/Documentos/documentos_sintetizados

# Documentos a inserir (4 items, ordem importa: doc1 -> doc2 -> doc3 -> doc4)
doc1_tipo_nome: "Alvará / Licença Sanitária"
doc1_arquivo: "sprint1/UC-F03/contrato_social.pdf"
doc1_validade: "2026-06-30"   # vencimento proximo -> badge Vence (amarelo) ou Vencido

doc2_tipo_nome: "Autorização de Funcionamento ANVISA (AFE)"
doc2_arquivo: "sprint1/UC-F03/fgts.pdf"
doc2_validade: "2027-08-22"   # >30 dias -> badge OK (verde)

doc3_tipo_nome: "Certificado ISO / Acreditação"
doc3_arquivo: "sprint1/UC-F03/alvara.pdf"
doc3_validade: "2026-10-15"   # >30 dias -> badge OK (verde)

doc4_tipo_nome: "Certidão Negativa Estadual"
doc4_arquivo: "sprint1/UC-F03/contrato_social.pdf"
doc4_validade: "2026-06-30"   # ja passada -> badge Vencido (vermelho)

