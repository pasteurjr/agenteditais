uc_id: UC-CV01
variacao: fp
trilha: visual
descricao: "Buscar editais por termo + Fonte=PNCP + Score Hibrido"

passos:
  - id: passo_00_navegar_captacao
    asserts_dom:
      - selector: 'h1:has-text("Captacao"), h2:has-text("Captacao")'
      - selector: 'div.form-field:has(.form-field-label:has-text("Termo"))'
      - selector: 'div.form-field:has(.form-field-label:has-text("Fonte"))'
      - selector: 'div.form-field:has(.form-field-label:has-text("Score"))'

  - id: passo_01_preencher_termo_busca
    asserts_dom:
      - selector: 'div.form-field:has(.form-field-label:has-text("Termo")) input[value*="monitor"], div.form-field:has(.form-field-label:has-text("Termo")) input'

  - id: passo_01b_selecionar_fonte_pncp
    # Sem assert (passo de setup/exploracao)

  - id: passo_01b2_selecionar_modalidade_pregao
    # Sem assert (passo de setup — filtra modalidade Pregão Eletrônico)

  - id: passo_01c_selecionar_score_hibrido
    asserts_dom:
      - selector: 'div.form-field:has(.form-field-label:has-text("Qtd editais profundo"))'

  - id: passo_02_buscar_editais
    asserts_dom:
      - selector: 'table tbody tr'
      - selector: 'th:has-text("Score")'
    asserts_rede:
      - url_contem: "/api/editais/buscar"
        status_in: [200, 201]

  - id: passo_03_validar_grade_resultados
    asserts_dom:
      - selector: 'table tbody tr'
