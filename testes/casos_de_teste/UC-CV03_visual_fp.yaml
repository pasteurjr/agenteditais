uc_id: UC-CV03
variacao: fp
trilha: visual
descricao: "Salvar edital, itens e scores"

passos:
  - id: passo_00_confirmar_grade
    asserts_dom:
      - selector: 'h1:has-text("Captacao"), h2:has-text("Captacao")'
      - selector: 'table tbody tr, .edital-card'

  - id: passo_01_salvar_edital
    asserts_rede:
      - url_contem: "/api/crud/editais"
        status_in: [200, 201]
