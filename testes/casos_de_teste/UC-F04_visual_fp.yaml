uc_id: UC-F04
variacao: fp
trilha: visual
descricao: "Buscar certidoes via scrapers (streaming)"

passos:
  - id: passo_00_setup_navegar_certidoes
    asserts_dom:
      - selector: '.card-title:has-text("Certidoes Automaticas"), h3:has-text("Certidoes Automaticas")'

  - id: passo_01_buscar_certidoes
    asserts_rede:
      - url_contem: "/api/empresa-certidoes/buscar-stream"
        metodo: POST
        status_in: [200, 201]
