uc_id: UC-F08
variacao: fp
trilha: visual
descricao: "Editar produto via API direta + validar persistencia + validar mascara da subclasse (V6 PROFUNDO)"

passos:
  - id: passo_00_setup_listar_produtos
    asserts_rede:
      - url_contem: "/api/crud/produtos"
        metodo: GET
        status_in: [200]

  - id: passo_01_editar_produto
    asserts_rede:
      - url_contem: "/api/crud/produtos/"
        metodo: PUT
        status_in: [200, 201]

  - id: passo_02_validar_persistencia
    asserts_rede:
      - url_contem: "/api/crud/produtos/"
        metodo: GET
        status_in: [200]

  - id: passo_03_validar_mascara_subclasse
    asserts_rede:
      - url_contem: "/api/crud/subclasses-produto/"
        metodo: GET
        status_in: [200]
