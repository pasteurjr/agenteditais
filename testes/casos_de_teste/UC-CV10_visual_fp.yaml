descricao: "Confrontar documentacao do edital com empresa via IA"

passos:
  - id: passo_00_aba_documentos
    # Sem assert (passo de setup/exploracao)

  - id: passo_01_clicar_identificar_documentos
    asserts_rede:
      # 200/201 = sucesso (requisitos extraidos)
      # 400 = sem PDF do edital (FE-04 valido — comportamento documentado)
      # 500 = erro IA transient (DeepSeek timeout ou rate limit) — tolerancia similar a CV12
