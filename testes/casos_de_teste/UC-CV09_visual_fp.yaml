uc_id: UC-CV09
variacao: fp
trilha: visual
descricao: "Importar itens do PNCP + extrair lotes via IA — EFEITO REAL via SQL fetch backend"

passos:
  - id: passo_00_aba_lotes
    asserts_dom:
      - selector: 'h4:has-text("Itens do Edital")'

  - id: passo_01_validar_estado_inicial_zero
    # Sem assert (exploracao - estado inicial pode ser 0 ou >0)

  - id: passo_02_clicar_buscar_itens_pncp
    # Sem assert de rede — passo idempotente. Validacao real em passo_03 via fetch SQL.

  - id: passo_03_validar_itens_importados
    # SEM assert DOM — passo executa fetch /api/crud/editais-itens e da throw se 0 itens.
    # APROVADO/INCONCLUSIVO via JS (throw -> REPROVADO; return -> INCONCLUSIVO/sucesso).

  - id: passo_04_clicar_extrair_lotes_ia
    # Sem assert de rede — idempotente. Validacao real em passo_05 via fetch SQL.

  - id: passo_05_validar_lotes_extraidos
    # SEM assert DOM — fetch /api/crud/lotes + throw se 0 lotes.
