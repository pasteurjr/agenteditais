uc_id: UC-CV09
variacao: fp
trilha: visual
descricao: "Importar itens e extrair lotes via IA"

passos:
  - id: passo_00_confirmar_selecionado
    asserts_dom:
      - selector: 'h1:has-text("Validacao")'

  - id: passo_01_abrir_aba_lotes
    # Sem assert (mudanca client-side)

  - id: passo_01b_importar_itens_pncp
    # Sem assert (passo opcional — so executa se itens estao zerados)

  - id: passo_02_extrair_lotes
    # Sem assert: cenario tem 3 caminhos validos —
    # 1) IA processa e cria lotes (200/201)
    # 2) edital sem itens importados via PNCP (FE-04 do UC) — botao nao aparece, sem request
    # 3) edital com lotes pre-existentes — botao "Reprocessar" clicado (200/201)
    # Como a presenca da request depende de qual caminho foi tomado, deixamos INCONCLUSIVO
    # em vez de exigir request fixa (evita REPROVADO falso quando cenario 2 acontece).
